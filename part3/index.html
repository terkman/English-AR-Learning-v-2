<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Part 3.1 | Source Wheel</title>

  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    :root{
      --part3:#c084fc;
      --part3-2:#a855f7;
      --dark:#2e1065;
      --line:rgba(255,255,255,.16);
      --panel:rgba(15,23,42,.86);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;touch-action:manipulation}
    a-scene,a-scene canvas{position:fixed!important;inset:0!important;width:100vw!important;height:100vh!important;z-index:1!important;background:transparent!important}
    video{position:fixed!important;inset:0!important;width:100vw!important;height:100vh!important;object-fit:cover!important;z-index:0!important;background:#000!important}
    .a-enter-vr,.a-enter-ar,.mindar-ui-overlay,.mindar-ui-scanning,.mindar-ui-loading,.mindar-ui-error{display:none!important}

    .topbar{position:fixed;z-index:30;top:0;left:0;right:0;padding:calc(10px + env(safe-area-inset-top)) 12px 10px;display:flex;align-items:center;justify-content:space-between;gap:10px;background:linear-gradient(180deg,rgba(2,6,23,.60),rgba(2,6,23,0));pointer-events:none}
    .topbar>*{pointer-events:auto}
    .back{display:inline-flex;align-items:center;gap:6px;color:#fff;text-decoration:none;background:rgba(15,23,42,.62);border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-weight:900;font-size:14px;backdrop-filter:blur(12px)}
    .status{max-width:48vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border-radius:999px;padding:8px 14px;font-size:12px;font-weight:950;letter-spacing:.04em;color:#230a3b;background:rgba(192,132,252,.95);box-shadow:0 8px 30px rgba(168,85,247,.24)}
    .status.found{background:rgba(6,214,160,.96);color:#00170f;box-shadow:0 8px 30px rgba(6,214,160,.22)}

    .start{position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;padding:22px;background:radial-gradient(circle at top,rgba(192,132,252,.36) 0%,#2e1065 38%,#020617 74%);text-align:center}
    .start-card{width:min(520px,100%);border:1px solid rgba(255,255,255,.18);border-radius:28px;padding:26px;background:rgba(255,255,255,.10);box-shadow:0 24px 90px rgba(0,0,0,.5);backdrop-filter:blur(16px)}
    .start h1{margin:0 0 8px;font-size:clamp(26px,8vw,38px);line-height:1.08;font-weight:950}
    .start p{margin:8px auto 16px;max-width:420px;line-height:1.55;color:#f3e8ff;font-size:15px}
    .start button{border:0;border-radius:18px;background:var(--part3);color:#230a3b;font-size:17px;font-weight:950;padding:14px 22px;box-shadow:0 12px 30px rgba(168,85,247,.32)}
    .start button:disabled{opacity:.55}
    .hint{font-size:13px;color:#e9d5ff;margin-top:12px;line-height:1.45}
    .error{display:none;margin-top:12px;color:#fecaca;background:rgba(127,29,29,.32);border:1px solid rgba(254,202,202,.25);border-radius:14px;padding:10px;line-height:1.45;text-align:left}

    .wheel-panel{position:fixed;left:10px;right:10px;bottom:calc(10px + env(safe-area-inset-bottom));z-index:35;display:none;border:1px solid rgba(192,132,252,.34);border-radius:22px;background:var(--panel);box-shadow:0 20px 60px rgba(0,0,0,.48);backdrop-filter:blur(16px);padding:12px}
    .wheel-panel.show{display:block}
    .popup-label{color:var(--part3);font-size:12px;font-weight:950;letter-spacing:.07em;text-transform:uppercase;margin:0 0 7px}
    .popup-question{max-height:86px;overflow:auto;border-radius:16px;padding:10px 12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:14px;line-height:1.45;font-weight:750;margin-bottom:10px;white-space:normal}
    .result-label{color:#c4b5fd;font-size:12px;font-weight:950;letter-spacing:.07em;text-transform:uppercase;margin:0 0 7px}
    .wheel-result{min-height:46px;border-radius:16px;padding:10px 12px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:14px;line-height:1.35;font-weight:800}
    .small-hint{margin-top:7px;color:#cbd5e1;font-size:12px;font-weight:700;line-height:1.35}
    @media (min-width:700px){.wheel-panel{left:50%;right:auto;width:min(680px,calc(100vw - 28px));transform:translateX(-50%)}}

  </style>
</head>
<body>
  <div class="topbar">
    <a class="back" href="../index.html">← Home</a>
    <div id="status" class="status">Ready</div>
  </div>

  <div id="start" class="start">
    <div class="start-card">
      <h1>Part 3.1 Source Wheel</h1>
      <p>Scan an image to see a full AR question, then spin the wheel to choose a source for finding answers.</p>
      <button id="startBtn" type="button">Start Camera</button>
      <div class="hint">Best on mobile Chrome. Please allow camera permission.</div>
      <div id="error" class="error"></div>
    </div>
  </div>

  <div id="wheelPanel" class="wheel-panel">
    <div class="popup-label">Question</div>
    <div id="popupQuestion" class="popup-question"></div>
    <div class="result-label">Selected Source</div>
    <div id="wheelResult" class="wheel-result">แตะวงล้อเพื่อสุ่มแหล่งข้อมูล</div>
    <div class="small-hint">แตะวงล้อหรือแตะบริเวณกล้องเพื่อ Spin</div>
  </div>

  <a-scene
    id="scene"
    cursor="rayOrigin: mouse; fuse: false"
    raycaster="objects: .clickable"
    mindar-image="imageTargetSrc: ../assets/targets/part3-1.mind; autoStart: false; maxTrack: 1; uiLoading: no; uiScanning: no; uiError: no; filterMinCF: 0.001; filterBeta: 0.01"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true; alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded>
    <a-camera position="0 0 0" look-controls="enabled: false" cursor="rayOrigin: mouse; fuse: false" raycaster="objects: .clickable"></a-camera>
    <a-entity light="type: ambient; intensity: 1.35"></a-entity>
    <a-entity light="type: directional; intensity: 0.9" position="0 1 1"></a-entity>
  </a-scene>

  <script>
    const DATA_URL='../assets/data/part3-1.json';
    const MIND_URL='../assets/targets/part3-1.mind';

    const scene=document.getElementById('scene');
    const startScreen=document.getElementById('start');
    const startBtn=document.getElementById('startBtn');
    const errorEl=document.getElementById('error');
    const statusEl=document.getElementById('status');
    const wheelPanel=document.getElementById('wheelPanel');
    const wheelResult=document.getElementById('wheelResult');
    const popupQuestion=document.getElementById('popupQuestion');

    let sourceData=null;
    let items=[];
    let wheelItems=[];
    let dataReady=false;
    let targetsBuilt=false;
    let activeItem=null;
    let wheelRotation=0;
    let isSpinning=false;
    let activeWheelPlane=null;
    const foundTargets=new Set();

    function setStatus(text,found=false){statusEl.textContent=text;statusEl.classList.toggle('found',!!found)}
    function showError(message){errorEl.style.display='block';errorEl.textContent=message}
    function cleanText(value){return String(value||'').replace(/\s+/g,' ').trim()}

    function isLatinToken(token){
      return /^[A-Za-z0-9][A-Za-z0-9’'?.!,;:()/-]*$/.test(token);
    }

    function measureText(ctx,text){
      return ctx.measureText(text).width;
    }

    function segmentThaiText(text){
      if(typeof Intl!=='undefined' && Intl.Segmenter){
        try{
          const segmenter=new Intl.Segmenter('th',{granularity:'word'});
          return Array.from(segmenter.segment(text)).map(part=>part.segment).filter(Boolean);
        }catch(error){}
      }
      return Array.from(text);
    }

    function splitLongToken(ctx,token,maxWidth){
      const parts=/[ก-๙]/.test(token) ? segmentThaiText(token) : Array.from(token);
      const pieces=[];
      let line='';

      parts.forEach(part=>{
        const candidate=line+part;
        if(measureText(ctx,candidate)>maxWidth&&line){
          pieces.push(line);
          line=part;
        }else{
          line=candidate;
        }
      });

      if(line)pieces.push(line);
      return pieces;
    }

    function tokenizeForWrap(text){
      const raw=String(text||'').replace(/\s+/g,' ').trim().split(' ').filter(Boolean);
      const tokens=[];
      let latinBuffer=[];

      function flushLatin(){
        if(latinBuffer.length){
          tokens.push(latinBuffer.join(' '));
          latinBuffer=[];
        }
      }

      raw.forEach(token=>{
        if(isLatinToken(token)){
          latinBuffer.push(token);
          if(latinBuffer.length>=4)flushLatin();
        }else{
          flushLatin();
          tokens.push(token);
        }
      });

      flushLatin();
      return tokens;
    }

    function wrapCanvasText(ctx,text,maxWidth){
      const tokens=[];
      tokenizeForWrap(text).forEach(token=>{
        if(measureText(ctx,token)>maxWidth){
          splitLongToken(ctx,token,maxWidth).forEach(piece=>tokens.push(piece));
        }else{
          tokens.push(token);
        }
      });

      const lines=[];
      let line='';

      tokens.forEach(token=>{
        const candidate=line ? `${line} ${token}` : token;

        if(measureText(ctx,candidate)>maxWidth&&line){
          lines.push(line);
          line=token;
        }else{
          line=candidate;
        }
      });

      if(line)lines.push(line);
      return lines;
    }

    function makeQuestionTexture(question){
      const canvas=document.createElement('canvas');
      const ctx=canvas.getContext('2d');
      const width=1800;
      canvas.width=width;

      let fontSize=48;
      if(question.length>85)fontSize=40;
      if(question.length>115)fontSize=34;
      if(question.length>150)fontSize=29;

      const maxTextWidth=Math.round(width*0.76);
      ctx.font=`750 ${fontSize}px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
      let lines=wrapCanvasText(ctx,question,maxTextWidth);

      while(lines.length>10&&fontSize>24){
        fontSize-=2;
        ctx.font=`750 ${fontSize}px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
        lines=wrapCanvasText(ctx,question,maxTextWidth);
      }

      const lineHeight=Math.round(fontSize*1.32);
      const height=Math.max(260,lines.length*lineHeight+92);
      canvas.height=height;

      ctx.clearRect(0,0,width,height);
      ctx.font=`750 ${fontSize}px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.lineJoin='round';

      const startY=height/2-((lines.length-1)*lineHeight)/2;
      lines.forEach((line,i)=>{
        const y=startY+i*lineHeight;

        ctx.shadowColor='rgba(46,16,101,.72)';
        ctx.shadowBlur=12;
        ctx.shadowOffsetX=3;
        ctx.shadowOffsetY=4;

        ctx.lineWidth=Math.max(6,Math.round(fontSize*.13));
        ctx.strokeStyle='rgba(2,6,23,.92)';
        ctx.strokeText(line,width/2,y);

        ctx.shadowBlur=0;
        ctx.shadowOffsetX=0;
        ctx.shadowOffsetY=0;

        ctx.fillStyle='#f8fafc';
        ctx.fillText(line,width/2,y);

        ctx.lineWidth=Math.max(1,Math.round(fontSize*.025));
        ctx.strokeStyle='rgba(216,180,254,.42)';
        ctx.strokeText(line,width/2,y);
      });

      const texture=new THREE.CanvasTexture(canvas);
      texture.needsUpdate=true;
      texture.minFilter=THREE.LinearFilter;
      texture.magFilter=THREE.LinearFilter;
      return {texture,aspect:canvas.width/canvas.height};
    }

    function makeWheelTexture(){
      const canvas=document.createElement('canvas');
      const size=1024;
      const ctx=canvas.getContext('2d');
      canvas.width=size;
      canvas.height=size;

      const colors=['#c084fc','#a78bfa','#818cf8','#60a5fa','#34d399','#facc15','#fb923c','#f472b6'];
      const cx=size/2;
      const cy=size/2;
      const r=size*0.46;
      const hole=size*0.16;
      const segment=(Math.PI*2)/colors.length;

      ctx.clearRect(0,0,size,size);

      colors.forEach((color,index)=>{
        const start=-Math.PI/2+index*segment;
        const end=start+segment;
        ctx.beginPath();
        ctx.moveTo(cx,cy);
        ctx.arc(cx,cy,r,start,end);
        ctx.closePath();
        ctx.fillStyle=color;
        ctx.fill();
        ctx.lineWidth=8;
        ctx.strokeStyle='rgba(255,255,255,.72)';
        ctx.stroke();
      });

      ctx.beginPath();
      ctx.arc(cx,cy,r+8,0,Math.PI*2);
      ctx.lineWidth=18;
      ctx.strokeStyle='rgba(255,255,255,.92)';
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(cx,cy,hole,0,Math.PI*2);
      ctx.fillStyle='rgba(2,6,23,.92)';
      ctx.fill();
      ctx.lineWidth=8;
      ctx.strokeStyle='rgba(255,255,255,.55)';
      ctx.stroke();

      const texture=new THREE.CanvasTexture(canvas);
      texture.needsUpdate=true;
      texture.minFilter=THREE.LinearFilter;
      texture.magFilter=THREE.LinearFilter;
      return texture;
    }

    function makePointerTexture(){
      const canvas=document.createElement('canvas');
      const ctx=canvas.getContext('2d');
      canvas.width=220;
      canvas.height=180;
      ctx.clearRect(0,0,220,180);

      ctx.beginPath();
      ctx.moveTo(110,165);
      ctx.lineTo(35,25);
      ctx.lineTo(185,25);
      ctx.closePath();
      ctx.fillStyle='#ffffff';
      ctx.shadowColor='rgba(0,0,0,.55)';
      ctx.shadowBlur=16;
      ctx.shadowOffsetY=8;
      ctx.fill();

      const texture=new THREE.CanvasTexture(canvas);
      texture.needsUpdate=true;
      texture.minFilter=THREE.LinearFilter;
      texture.magFilter=THREE.LinearFilter;
      return texture;
    }

    const WHEEL_TEXTURE=makeWheelTexture();
    const POINTER_TEXTURE=makePointerTexture();

    function makeQuestionPlane(item,width){
      const plane=document.createElement('a-plane');
      const made=makeQuestionTexture(item.question);
      const height=width/made.aspect;
      plane.setAttribute('geometry',`primitive: plane; width: ${width}; height: ${height}`);
      plane.setAttribute('material','shader: flat; transparent: true; alphaTest: 0.02; side: double; depthTest: true; depthWrite: false');
      plane.__questionHeight=height;
      plane.addEventListener('loaded',()=>{
        const mesh=plane.getObject3D('mesh');
        if(!mesh)return;
        mesh.material.map=made.texture;
        mesh.material.transparent=true;
        mesh.material.needsUpdate=true;
      });
      return plane;
    }

    function makeWheelPlane(target,item,size){
      const wheelPlane=document.createElement('a-plane');
      wheelPlane.setAttribute('class','clickable');
      wheelPlane.setAttribute('geometry',`primitive: plane; width: ${size}; height: ${size}`);
      wheelPlane.setAttribute('position','0 0 0.015');
      wheelPlane.setAttribute('material','shader: flat; transparent: true; alphaTest: 0.02; side: double; depthTest: false; depthWrite: false');
      wheelPlane.addEventListener('loaded',()=>{
        const mesh=wheelPlane.getObject3D('mesh');
        if(!mesh)return;
        mesh.material.map=WHEEL_TEXTURE;
        mesh.material.transparent=true;
        mesh.material.needsUpdate=true;
      });
      wheelPlane.addEventListener('click',(event)=>{
        event.stopPropagation();
        activeItem=item;
        activeWheelPlane=wheelPlane;
        spinWheel();
      });
      wheelPlane.addEventListener('touchend',(event)=>{
        event.preventDefault();
        event.stopPropagation();
        activeItem=item;
        activeWheelPlane=wheelPlane;
        spinWheel();
      },{passive:false});
      return wheelPlane;
    }

    function makePointerPlane(size){
      const pointer=document.createElement('a-plane');
      pointer.setAttribute('geometry',`primitive: plane; width: ${size*0.26}; height: ${size*0.22}`);
      pointer.setAttribute('position',`0 ${size*0.56} 0.035`);
      pointer.setAttribute('material','shader: flat; transparent: true; alphaTest: 0.02; side: double; depthTest: false; depthWrite: false');
      pointer.addEventListener('loaded',()=>{
        const mesh=pointer.getObject3D('mesh');
        if(!mesh)return;
        mesh.material.map=POINTER_TEXTURE;
        mesh.material.transparent=true;
        mesh.material.needsUpdate=true;
      });
      return pointer;
    }

    function buildARContentGroup(item){
      const group=document.createElement('a-entity');
      group.setAttribute('position','0 -0.04 0.08');
      group.setAttribute('rotation','0 0 0');

      const wheelSize=0.48;
      const questionWidth=0.92;
      const questionPlane=makeQuestionPlane(item,questionWidth);
      const questionY=(wheelSize/2)+0.10+(questionPlane.__questionHeight/2);
      questionPlane.setAttribute('position',`0 ${questionY} 0.035`);

      const wheelGroup=document.createElement('a-entity');
      wheelGroup.setAttribute('position','0 0 0.04');
      const wheelPlane=makeWheelPlane(group,item,wheelSize);
      group.__wheelPlane=wheelPlane;
      wheelGroup.appendChild(wheelPlane);
      wheelGroup.appendChild(makePointerPlane(wheelSize));

      group.appendChild(questionPlane);
      group.appendChild(wheelGroup);
      return group;
    }

    function showPanel(item){
      activeItem=item;
      popupQuestion.textContent=item.question || '';
      wheelResult.textContent='แตะวงล้อเพื่อสุ่มแหล่งข้อมูล';
      wheelPanel.classList.add('show');
    }

    function hidePanel(){
      activeItem=null;
      activeWheelPlane=null;
      wheelPanel.classList.remove('show');
      popupQuestion.textContent='';
      wheelResult.textContent='แตะวงล้อเพื่อสุ่มแหล่งข้อมูล';
    }

    function buildTargets(){
      if(targetsBuilt)return;
      items.forEach(item=>{
        const target=document.createElement('a-entity');
        target.setAttribute('mindar-image-target',`targetIndex: ${item.index}`);

        target.addEventListener('targetFound',()=>{
          foundTargets.add(item.index);
          setStatus('Found',true);
          if(!target.__questionGroup){
            target.__questionGroup=buildARContentGroup(item);
            target.appendChild(target.__questionGroup);
          }
          activeWheelPlane=target.__questionGroup.__wheelPlane || activeWheelPlane;
          showPanel(item);
          if(navigator.vibrate)navigator.vibrate(35);
        });

        target.addEventListener('targetLost',()=>{
          foundTargets.delete(item.index);
          if(target.__questionGroup){
            target.removeChild(target.__questionGroup);
            target.__questionGroup=null;
          }
          if(foundTargets.size===0){
            setStatus('Scanning',false);
            hidePanel();
          }
        });

        scene.appendChild(target);
      });
      targetsBuilt=true;
    }

    async function loadData(){
      const response=await fetch(DATA_URL,{cache:'no-store'});
      if(!response.ok)throw new Error('Cannot load part3-1.json');
      sourceData=await response.json();
      items=Array.isArray(sourceData.items)?sourceData.items:[];
      wheelItems=Array.isArray(sourceData.wheelItems)?sourceData.wheelItems:[];
      if(!items.length)throw new Error('part3-1.json has no items');
      if(wheelItems.length!==8)throw new Error('Wheel items must have 8 items');
      buildTargets();
      dataReady=true;
    }

    function waitForSceneLoaded(){return new Promise(resolve=>{if(scene.hasLoaded)resolve();else scene.addEventListener('loaded',resolve,{once:true})})}
    async function checkMindFile(){const response=await fetch(MIND_URL,{cache:'no-store'});if(!response.ok)throw new Error('Cannot find assets/targets/part3-1.mind')}

    async function startAR(){
      try{
        startBtn.disabled=true;
        errorEl.style.display='none';
        setStatus('Starting');
        await checkMindFile();
        await waitForSceneLoaded();
        if(!dataReady)await loadData();
        const mindarSystem=scene.systems['mindar-image-system'];
        if(!mindarSystem)throw new Error('MindAR system is not ready');
        await mindarSystem.start();
        startScreen.style.display='none';
        setStatus('Scanning');
      }catch(error){
        console.error(error);
        setStatus('Error');
        showError(error.message||'Cannot start AR. Please check camera permission and .mind file.');
        startBtn.disabled=false;
      }
    }

    function spinWheel(){
      if(!wheelItems.length||isSpinning||!activeWheelPlane)return;
      isSpinning=true;
      wheelResult.textContent='Spinning...';

      const selectedIndex=Math.floor(Math.random()*wheelItems.length);
      const segment=360/wheelItems.length;
      const targetAngle=360-(selectedIndex*segment+segment/2);
      const extraTurns=360*(4+Math.floor(Math.random()*3));
      wheelRotation+=extraTurns+targetAngle-(wheelRotation%360);

      const mesh=activeWheelPlane.getObject3D('mesh');
      if(mesh){
        const startRotation=mesh.rotation.z;
        const endRotation=THREE.MathUtils.degToRad(wheelRotation);
        const startTime=performance.now();
        const duration=2800;

        const easeOut=(t)=>1-Math.pow(1-t,3);

        const animate=(now)=>{
          const t=Math.min(1,(now-startTime)/duration);
          mesh.rotation.z=startRotation+(endRotation-startRotation)*easeOut(t);
          if(t<1){
            requestAnimationFrame(animate);
          }else{
            wheelResult.textContent=wheelItems[selectedIndex];
            isSpinning=false;
          }
        };

        requestAnimationFrame(animate);
      }else{
        wheelResult.textContent=wheelItems[selectedIndex];
        isSpinning=false;
      }
    }


    function handleGlobalSpinTap(event){
      if(!activeItem || isSpinning) return;

      const target=event.target;
      if(target && target.closest && target.closest('.topbar,.wheel-panel,.start')) return;

      // fallback for mobile browsers where AR raycaster click on the plane is unreliable
      spinWheel();
    }

    document.addEventListener('click',handleGlobalSpinTap);
    document.addEventListener('touchend',(event)=>{
      handleGlobalSpinTap(event);
    },{passive:true});

    scene.addEventListener('arReady',()=>console.log('[3.1] AR ready'));
    scene.addEventListener('arError',()=>{setStatus('Camera Error');showError('Camera access failed. Please allow camera permission and reload this page.')});
    startBtn.addEventListener('click',startAR);
    loadData().catch(error=>{console.error(error);setStatus('Data Error');showError(error.message||'Cannot load AR data.')});
  </script>
</body>
</html>
