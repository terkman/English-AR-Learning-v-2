<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>1.2 สแกนภาพขึ้นภาพ</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020617;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.a-enter-vr{display:none!important}a-scene{width:100%;height:100%}.top{position:fixed;z-index:20;top:0;left:0;right:0;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,rgba(2,6,23,.88),transparent);pointer-events:none}.top>*{pointer-events:auto}.back{color:#fff;text-decoration:none;background:rgba(15,23,42,.7);border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:8px 12px;font-weight:800}.pill{background:rgba(167,139,250,.9);color:#16052e;border-radius:999px;padding:8px 12px;font-weight:950}.start{position:fixed;inset:0;z-index:50;background:radial-gradient(circle at top,#6d28d9,#020617 62%);display:flex;align-items:center;justify-content:center;text-align:center;padding:22px}.start-card{max-width:520px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:28px;padding:26px;box-shadow:0 24px 80px rgba(0,0,0,.42)}.start h1{font-size:32px;margin:0 0 12px}.start p{color:#ede9fe;line-height:1.55}.start button{border:0;border-radius:18px;background:#c4b5fd;color:#17072c;font-weight:950;font-size:17px;padding:14px 22px}.hint{font-size:13px;color:#ddd6fe;margin-top:12px}.error{display:none;color:#fecaca;margin-top:12px;line-height:1.45}.panel{position:fixed;z-index:22;left:12px;right:12px;bottom:16px;background:rgba(2,6,23,.84);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.16);border-radius:24px;padding:14px 16px;box-shadow:0 18px 70px rgba(0,0,0,.45);transform:translateY(120%);transition:.22s ease}.panel.show{transform:translateY(0)}.label{font-size:12px;color:#c4b5fd;font-weight:950;text-transform:uppercase;letter-spacing:.08em}.title{font-size:clamp(22px,6vw,32px);font-weight:950;line-height:1.15;margin-top:3px}.note{font-size:14px;color:#ede9fe;line-height:1.45;margin-top:8px}.hide{margin-top:12px;width:100%;border:0;border-radius:999px;padding:10px 12px;font-weight:900;background:rgba(255,255,255,.12);color:#fff}
  </style>
</head>
<body>
  <div class="top"><a class="back" href="../">← Part 1</a><div id="status" class="pill">1.2 READY</div></div>
  <div id="start" class="start"><div class="start-card"><h1>1.2 สแกนภาพขึ้นภาพ</h1><p>สแกนภาพข้อความที่เตรียมไว้ แล้วระบบจะแสดงภาพบริบทผลลัพธ์บน AR</p><button id="startBtn">Start Camera</button><div class="hint">ต้องมีไฟล์ assets/targets/part1-2.mind</div><div id="error" class="error"></div></div></div>
  <aside id="panel" class="panel"><div class="label">Image Context</div><div id="title" class="title">Point camera at a 1.2 target image</div><div id="note" class="note">สแกนภาพข้อความ เช่น Keep Quiet แล้วจะเห็นภาพบริบทที่เกี่ยวข้อง</div><button id="hide" class="hide">Hide</button></aside>
  <a-scene id="scene" mindar-image="imageTargetSrc: ../../assets/targets/part1-2.mind; autoStart: false; uiLoading: yes; uiScanning: yes; filterMinCF:0.0001; filterBeta:0.001" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled:false" device-orientation-permission-ui="enabled:false" embedded>
    <a-assets id="assets"></a-assets>
    <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>
  </a-scene>
  <script>
    const DATA_URL='../../assets/data/part1-2.json', IMG_BASE='../../assets/images/part1/1.2/results/';
    const scene=document.getElementById('scene'), assets=document.getElementById('assets'), start=document.getElementById('start'), startBtn=document.getElementById('startBtn'), errorEl=document.getElementById('error'), statusEl=document.getElementById('status');
    const panel=document.getElementById('panel'), titleEl=document.getElementById('title'), noteEl=document.getElementById('note'), hideBtn=document.getElementById('hide');
    let data=[];
    function setPanel(item){ if(!item){statusEl.textContent='SCANNING'; return;} titleEl.textContent=item.title||'Target Found'; noteEl.textContent=(item.contexts&&item.contexts.length?'บริบท: '+item.contexts.join(' / ')+' — ':'')+(item.note||''); panel.classList.add('show'); statusEl.textContent='TARGET '+String(item.index+1).padStart(2,'0'); if(navigator.vibrate)navigator.vibrate(35); }
    function build(){ data.forEach((item,i)=>{ const img=document.createElement('img'); img.id='result-'+i; img.src=IMG_BASE+item.resultImage; img.crossOrigin='anonymous'; assets.appendChild(img); const t=document.createElement('a-entity'); t.setAttribute('mindar-image-target','targetIndex: '+item.index); const p=document.createElement('a-plane'); p.setAttribute('src','#result-'+i); p.setAttribute('position','0 0 0.02'); p.setAttribute('width','1.28'); p.setAttribute('height','0.82'); p.setAttribute('material','transparent:true; shader:flat'); t.appendChild(p); t.addEventListener('targetFound',()=>setPanel(item)); t.addEventListener('targetLost',()=>{statusEl.textContent='SEARCHING';}); scene.appendChild(t); }); }
    async function init(){ const r=await fetch(DATA_URL,{cache:'no-store'}); if(!r.ok)throw new Error('JSON'); data=await r.json(); build(); }
    async function startAR(){ try{ startBtn.disabled=true; await scene.systems['mindar-image-system'].start(); start.style.display='none'; statusEl.textContent='SCANNING'; }catch(e){ console.error(e); errorEl.style.display='block'; errorEl.textContent='เริ่ม AR ไม่สำเร็จ: ตรวจสอบว่า assets/targets/part1-2.mind มีอยู่และ path ถูกต้อง'; startBtn.disabled=false; } }
    hideBtn.onclick=()=>panel.classList.remove('show'); startBtn.onclick=startAR; init().catch(e=>{console.error(e); errorEl.style.display='block'; errorEl.textContent='โหลดข้อมูล part1-2.json ไม่สำเร็จ';});
  </script>
</body>
</html>
