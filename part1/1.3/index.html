<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
<title>1.3 Scan Image to Question</title>
<script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<script src="https://unpkg.com/aframe-text-geometry-component@0.5.2/dist/aframe-text-geometry-component.min.js"></script>
<style>
    :root{--theme:#38bdf8;--shadow:#082f49;--line:rgba(255,255,255,.16);--panel:rgba(2,6,23,.82)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;touch-action:manipulation}
    a-scene,a-scene canvas{position:fixed!important;inset:0!important;width:100vw!important;height:100vh!important;z-index:1!important;background:transparent!important}
    video{position:fixed!important;inset:0!important;width:100vw!important;height:100vh!important;object-fit:cover!important;z-index:0!important;background:#000!important}
    .a-enter-vr,.a-enter-ar,.mindar-ui-overlay,.mindar-ui-scanning,.mindar-ui-loading,.mindar-ui-error{display:none!important}
    .topbar{position:fixed;z-index:30;top:0;left:0;right:0;padding:calc(10px + env(safe-area-inset-top)) 12px 10px;display:flex;align-items:center;justify-content:space-between;gap:10px;background:linear-gradient(180deg,rgba(2,6,23,.58),rgba(2,6,23,0));pointer-events:none}
    .topbar>*{pointer-events:auto}
    .back{display:inline-flex;align-items:center;gap:6px;color:#fff;text-decoration:none;background:rgba(15,23,42,.62);border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-weight:900;font-size:14px;backdrop-filter:blur(12px)}
    .status{max-width:48vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border-radius:999px;padding:8px 14px;font-size:12px;font-weight:950;letter-spacing:.04em;color:#1c1500;background:var(--theme);box-shadow:0 8px 30px rgba(255,214,10,.18)}
    .status.found{background:rgba(6,214,160,.96);color:#00170f;box-shadow:0 8px 30px rgba(6,214,160,.22)}
    .start{position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;padding:22px;background:radial-gradient(circle at top,rgba(255,255,255,.16) 0%,var(--shadow) 36%,#020617 72%);text-align:center}
    .start-card{width:min(520px,100%);border:1px solid rgba(255,255,255,.18);border-radius:28px;padding:26px;background:rgba(255,255,255,.10);box-shadow:0 24px 90px rgba(0,0,0,.5);backdrop-filter:blur(16px)}
    .start h1{margin:0 0 8px;font-size:clamp(26px,8vw,38px);line-height:1.08;font-weight:950}
    .start p{margin:8px auto 16px;max-width:420px;line-height:1.55;color:#f8fafc;font-size:15px}
    .start button{border:0;border-radius:18px;background:var(--theme);color:#1c1500;font-size:17px;font-weight:950;padding:14px 22px;box-shadow:0 12px 30px rgba(255,214,10,.24)}
    .start button:disabled{opacity:.55}
    .hint{font-size:13px;color:#e0f2fe;margin-top:12px;line-height:1.45}
    .error{display:none;margin-top:12px;color:#fecaca;background:rgba(127,29,29,.32);border:1px solid rgba(254,202,202,.25);border-radius:14px;padding:10px;line-height:1.45;text-align:left}
    
    .question-panel{position:fixed;left:12px;right:12px;bottom:calc(12px + env(safe-area-inset-bottom));z-index:35;display:none;border:1px solid rgba(56,189,248,.28);border-radius:22px;padding:13px 14px;background:rgba(2,6,23,.78);box-shadow:0 18px 50px rgba(0,0,0,.42);backdrop-filter:blur(16px)}
    .question-panel.show{display:block}
    .question-label{color:var(--theme);font-size:12px;line-height:1;letter-spacing:.08em;font-weight:950;text-transform:uppercase;margin-bottom:7px}
    .question-text{color:#f8fafc;font-size:clamp(15px,4vw,18px);line-height:1.45;font-weight:800}
</style>
</head>
<body>
  <div class="topbar">
    <a class="back" href="../index.html">← Part 1</a>
    <div id="status" class="status">Ready</div>
  </div>

  <div id="questionPanel" class="question-panel"><div class="question-label">Observe & Ask</div><div id="questionText" class="question-text"></div></div>

  <div id="start" class="start">
    <div class="start-card">
      <h1>1.3 Scan Image to Question</h1>
      <p>Tap Start Camera and scan a target image. A 3D English phrase and one observation question will appear.</p>
      <button id="startBtn" type="button">Start Camera</button>
      <div class="hint">Best on mobile Chrome. Please allow camera permission.</div>
      <div id="error" class="error"></div>
    </div>
  </div>

  <a-scene
    id="scene"
    mindar-image="imageTargetSrc: ../../assets/targets/part1-3.mind; autoStart: false; maxTrack: 1; uiLoading: no; uiScanning: no; uiError: no; filterMinCF: 0.001; filterBeta: 0.01"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true; alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded>
    <a-assets timeout="15000">
      <a-asset-item id="fontBold" src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r146/examples/fonts/helvetiker_bold.typeface.json"></a-asset-item>
    </a-assets>
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity light="type: ambient; intensity: 1.35"></a-entity>
    <a-entity light="type: directional; intensity: 0.9" position="0 1 1"></a-entity>
  </a-scene>

<script>
    const TEXT_COLOR='#38bdf8';
    const TEXT_SHADOW='#082f49';
    const TEXT_STROKE='#00131d';
    const LETTER_GAP=0.010;

    const DATA_URL='../../assets/data/part1-3.json';
    const MIND_URL='../../assets/targets/part1-3.mind';

    const scene=document.getElementById('scene');
    const startScreen=document.getElementById('start');
    const startBtn=document.getElementById('startBtn');
    const errorEl=document.getElementById('error');
    const statusEl=document.getElementById('status');

    let vocabData=[];
    let dataReady=false;
    let targetsBuilt=false;
    const foundTargets=new Set();

    function setStatus(text,found=false){statusEl.textContent=text;statusEl.classList.toggle('found',!!found)}
    function showError(message){errorEl.style.display='block';errorEl.textContent=message}

    async function loadData(){
      const response=await fetch(DATA_URL,{cache:'no-store'});
      if(!response.ok)throw new Error('Cannot load data file');
      vocabData=await response.json();
      if(!Array.isArray(vocabData)||vocabData.length===0)throw new Error('Data file has no data');
      buildTargets();
      dataReady=true;
    }

    function waitForSceneLoaded(){
      return new Promise(resolve=>{if(scene.hasLoaded)resolve();else scene.addEventListener('loaded',resolve,{once:true})});
    }

    async function checkMindFile(){
      const response=await fetch(MIND_URL,{cache:'no-store'});
      if(!response.ok)throw new Error('Cannot find .mind file');
    }

    async function startAR(){
      try{
        startBtn.disabled=true;
        errorEl.style.display='none';
        setStatus('Starting');
        await checkMindFile();
        await waitForSceneLoaded();
        if(!dataReady)await loadData();
        const mindarSystem=scene.systems['mindar-image-system'];
        if(!mindarSystem)throw new Error('MindAR system is not ready');
        await mindarSystem.start();
        startScreen.style.display='none';
        setStatus('Scanning');
      }catch(error){
        console.error(error);
        setStatus('Error');
        showError(error.message||'Cannot start AR. Please check camera permission and .mind file.');
        startBtn.disabled=false;
      }
    }

    scene.addEventListener('arReady',()=>console.log('[1.3] AR ready'));
    scene.addEventListener('arError',()=>{setStatus('Camera Error');showError('Camera access failed. Please allow camera permission and reload this page.')});
    startBtn.addEventListener('click',startAR);
    loadData().catch(error=>{console.error(error);setStatus('Data Error');showError(error.message||'Cannot load AR data.')});

    function cleanText(value){return String(value||'').replace(/;/g,',').replace(/\s+/g,' ').trim()}

    function getCharWidth(char,size){
      if(char===' ')return size*0.48;
      if('ilI.,:;!|'.includes(char))return size*0.34;
      if('mwMW'.includes(char))return size*0.92;
      if('fjrt()[]'.includes(char))return size*0.48;
      if('ABCDEFGHKNOPQRSTUVWXYZ'.includes(char))return size*0.72;
      return size*0.62;
    }

    function centerTextMesh(entity){
      const applyCenter=()=>{
        let didCenter=false;
        entity.object3D.traverse(child=>{
          if(!child.isMesh||!child.geometry)return;
          if(child.geometry.userData&&child.geometry.userData.centeredX)return;
          child.geometry.computeBoundingBox();
          const box=child.geometry.boundingBox;
          if(!box)return;
          const centerX=(box.min.x+box.max.x)/2;
          child.geometry.translate(-centerX,0,0);
          child.geometry.computeBoundingBox();
          child.geometry.userData=child.geometry.userData||{};
          child.geometry.userData.centeredX=true;
          didCenter=true;
        });
        return didCenter;
      };
      const tryCenter=(attempt=0)=>{
        if(applyCenter())return;
        if(attempt>30)return;
        requestAnimationFrame(()=>tryCenter(attempt+1));
      };
      entity.addEventListener('object3dset',()=>tryCenter());
      entity.addEventListener('componentinitialized',event=>{
        if(event.detail&&event.detail.name==='text-geometry')tryCenter();
      });
      tryCenter();
      setTimeout(()=>tryCenter(),100);
      setTimeout(()=>tryCenter(),300);
      setTimeout(()=>tryCenter(),700);
      setTimeout(()=>tryCenter(),1200);
    }

    function createCharGeometry(char,position,size,role='front'){
      const text=document.createElement('a-entity');
      text.setAttribute('position',position);
      text.setAttribute('rotation','0 0 0');
      text.setAttribute('text-geometry',{
        value:char,
        font:'#fontBold',
        align:'center',
        size:size,
        height:0.018,
        curveSegments:5,
        bevelEnabled:true,
        bevelSize:0.0025,
        bevelThickness:0.0025
      });

      if(role==='stroke'){
        text.setAttribute('material',{
          shader:'standard',
          color:TEXT_STROKE,
          emissive:TEXT_STROKE,
          emissiveIntensity:0.10,
          opacity:0.98,
          transparent:true,
          metalness:0,
          roughness:0.75,
          side:'double'
        });
      }else if(role==='shadow'){
        text.setAttribute('material',{
          shader:'standard',
          color:TEXT_SHADOW,
          emissive:TEXT_SHADOW,
          emissiveIntensity:0.16,
          opacity:0.70,
          transparent:true,
          metalness:0,
          roughness:0.7,
          side:'double'
        });
      }else{
        text.setAttribute('material',{
          shader:'standard',
          color:TEXT_COLOR,
          emissive:TEXT_COLOR,
          emissiveIntensity:0.55,
          metalness:0.02,
          roughness:0.25,
          side:'double'
        });
      }

      centerTextMesh(text);
      return text;
    }

    function buildLetterSpacedLine(line,y,size){
      const lineGroup=document.createElement('a-entity');
      const chars=Array.from(cleanText(line));
      const widths=chars.map(char=>getCharWidth(char,size));
      const totalWidth=widths.reduce((sum,width)=>sum+width,0)+Math.max(0,chars.length-1)*LETTER_GAP;
      let cursorX=-totalWidth/2;

      chars.forEach((char,index)=>{
        const width=widths[index];
        if(char!==' '){
          const x=cursorX+width/2;

          const shadow=createCharGeometry(
            char,
            `${(x+0.007).toFixed(4)} ${(y-0.007).toFixed(4)} -0.012`,
            size,
            'shadow'
          );
          lineGroup.appendChild(shadow);

          const thinStrokeOffsets=[
            [-0.004,0.000],
            [0.004,0.000],
            [0.000,-0.004],
            [0.000,0.004]
          ];

          thinStrokeOffsets.forEach(([sx,sy])=>{
            const stroke=createCharGeometry(
              char,
              `${(x+sx).toFixed(4)} ${(y+sy).toFixed(4)} -0.003`,
              size,
              'stroke'
            );
            lineGroup.appendChild(stroke);
          });

          const front=createCharGeometry(
            char,
            `${x.toFixed(4)} ${y.toFixed(4)} 0.002`,
            size,
            'front'
          );
          lineGroup.appendChild(front);
        }
        cursorX+=width+LETTER_GAP;
      });

      return lineGroup;
    }

    function buildTextGroupFromLines(lines,size,gapMultiplier=1.55){
      const group=document.createElement('a-entity');
      if(!lines.length)return group;

      const gap=size*gapMultiplier;
      const startY=((lines.length-1)*gap)/2;

      group.setAttribute('position','0 0.02 0.06');
      group.setAttribute('rotation','0 0 0');

      lines.forEach((line,index)=>{
        const y=startY-(index*gap);
        group.appendChild(buildLetterSpacedLine(line,y,size));
      });

      return group;
    }

    const questionPanel=document.getElementById('questionPanel');
    const questionText=document.getElementById('questionText');
    const QUESTION_STORAGE_KEY='part1_3_question_cursor_v1';
    const activeQuestionIndex={};

    function readQuestionCursor(){try{return JSON.parse(localStorage.getItem(QUESTION_STORAGE_KEY)||'{}')}catch(error){return {}}}
    function writeQuestionCursor(cursor){try{localStorage.setItem(QUESTION_STORAGE_KEY,JSON.stringify(cursor))}catch(error){console.warn('Cannot save question cursor',error)}}
    function getNextQuestionIndex(targetIndex,totalQuestions){
      const cursor=readQuestionCursor();
      const key=String(targetIndex);
      const currentIndex=Number.isInteger(cursor[key])?cursor[key]:0;
      cursor[key]=(currentIndex+1)%totalQuestions;
      writeQuestionCursor(cursor);
      return currentIndex;
    }

    function showQuestion(item){
      const questions=Array.isArray(item.questions)?item.questions.filter(Boolean):[];
      if(!questions.length){hideQuestion();return}
      if(activeQuestionIndex[item.index]===undefined){
        activeQuestionIndex[item.index]=getNextQuestionIndex(item.index,questions.length);
      }
      questionText.textContent=questions[activeQuestionIndex[item.index]];
      questionPanel.classList.add('show');
    }
    function hideQuestion(){questionPanel.classList.remove('show');questionText.textContent=''}

    function splitWordLines(word){
      const text=cleanText(word);
      if(!text)return[];
      if(text.length<=16)return[text];
      const words=text.split(' ');
      const lines=[];
      let line='';
      words.forEach(part=>{
        const candidate=line?`${line} ${part}`:part;
        if(candidate.length>16&&line){lines.push(line);line=part}else{line=candidate}
      });
      if(line)lines.push(line);
      return lines.slice(0,3);
    }

    function getWordTextSize(lines){
      const longest=lines.reduce((max,line)=>Math.max(max,line.length),0);
      if(lines.length>=3||longest>=22)return 0.050;
      if(lines.length>=2||longest>=16)return 0.060;
      return 0.075;
    }

    function makeTextGroup(item){
      const lines=splitWordLines(item.word);
      return buildTextGroupFromLines(lines,getWordTextSize(lines),1.55);
    }

    function buildTargets(){
      if(targetsBuilt)return;
      vocabData.forEach(item=>{
        const target=document.createElement('a-entity');
        target.setAttribute('mindar-image-target',`targetIndex: ${item.index}`);

        target.addEventListener('targetFound',()=>{
          foundTargets.add(item.index);
          setStatus('Found',true);
          if(!target.__textGroup){
            target.__textGroup=makeTextGroup(item);
            target.appendChild(target.__textGroup);
          }
          showQuestion(item);
          if(navigator.vibrate)navigator.vibrate(35);
        });

        target.addEventListener('targetLost',()=>{
          foundTargets.delete(item.index);
          delete activeQuestionIndex[item.index];
          if(target.__textGroup){
            target.removeChild(target.__textGroup);
            target.__textGroup=null;
          }
          if(foundTargets.size===0){setStatus('Scanning',false);hideQuestion()}
        });

        scene.appendChild(target);
      });
      targetsBuilt=true;
    }
</script>
</body>
</html>
